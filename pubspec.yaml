name: hetu_spotube_plugin
description: "A new Flutter package project."
version: 0.0.2
homepage: https://github.com/KRTirtho/hetu_spotube_plugin

publish_to: none

environment:
  sdk: ^3.7.2
  flutter: ">=1.17.0"

dependencies:
  desktop_webview_window:
    git:
      path: packages/desktop_webview_window
      url: https://github.com/KRTirtho/flutter-plugins.git
  fk_user_agent:
    git:
      url: https://github.com/maeltoukap/fk_user_agent.git
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_timezone: ^4.1.1
  hetu_script: ^0.4.2+1
  hetu_std:
    git:
      url: https://github.com/hetu-community/hetu_std.git
      ref: main
  path: ^1.9.1
  path_provider: ^2.1.5
  random_user_agents: ^1.0.15
    
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

